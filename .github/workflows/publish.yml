name: Upload dotnet package

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Resolve package version from release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - run: dotnet build --configuration Release /p:Version=$PACKAGE_VERSION

      - name: Create the package
        run: dotnet pack --configuration Release --no-build /p:Version=$PACKAGE_VERSION --include-symbols --include-source --output ./nuget-packages

      - name: Publish the package to NuGet
        run: |
          for pkg in ./nuget-packages/MotzArt.FluentAssertions.*.nupkg; do
            dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate --source https://api.nuget.org/v3/index.json
          done
        
      - name: Publish the symbols package to NuGet
        run: |
          for pkg in ./nuget-packages/MotzArt.FluentAssertions.*.snupkg; do
            dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate --source https://api.nuget.org/v3/index.json
          done
